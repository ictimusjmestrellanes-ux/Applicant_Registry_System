trigger:
- main

variables:
  azureSubscription: '6fe734cc-3f4f-4a31-80ba-59dab1195e36'
  webAppName: 'app-reg-sys'
  vmImageName: 'ubuntu-latest'
  environmentName: 'app-reg-sys'
  rootFolder: $(System.DefaultWorkingDirectory)

stages:
- stage: Build
  displayName: Build stage
  jobs:
  - job: BuildJob
    pool:
      vmImage: $(vmImageName)

    steps:
    - script: |
        set -e

        php -v || true

        if ! command -v php8.4 >/dev/null 2>&1; then
          sudo apt-get update -o Acquire::Retries=3 -o Acquire::http::Timeout=30
          sudo apt-get install -y ca-certificates curl gnupg lsb-release apt-transport-https

          curl -fsSL "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0xB8DC7E53946656EFBCE4C1DD71DAEAAB4AD4CAB6" \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/ondrej-php.gpg >/dev/null

          echo "deb [signed-by=/usr/share/keyrings/ondrej-php.gpg] https://ppa.launchpadcontent.net/ondrej/php/ubuntu $(lsb_release -sc) main" \
            | sudo tee /etc/apt/sources.list.d/ondrej-php.list >/dev/null

          sudo apt-get update -o Acquire::Retries=3 -o Acquire::http::Timeout=30
          sudo apt-get install -y \
            php8.4 \
            php8.4-cli \
            php8.4-common \
            php8.4-curl \
            php8.4-mbstring \
            php8.4-xml \
            php8.4-bcmath \
            php8.4-zip \
            php8.4-intl \
            php8.4-mysql \
            php8.4-sqlite3
        fi

        sudo update-alternatives --set php /usr/bin/php8.4
        sudo update-alternatives --set phar /usr/bin/phar8.4 || true
        sudo update-alternatives --set phar.phar /usr/bin/phar.phar8.4 || true
        sudo update-alternatives --set phpdbg /usr/bin/phpdbg8.4 || true
        sudo update-alternatives --set php-cgi /usr/bin/php-cgi8.4 || true

        php -v
        php -r "exit(version_compare(PHP_VERSION, '8.4.0', '>=') ? 0 : 1);"
        composer --version
      workingDirectory: $(rootFolder)
      displayName: 'Install and use PHP 8.4'

    - script: |
        set -e
        composer validate --no-check-publish
        composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
      workingDirectory: $(rootFolder)
      displayName: 'Composer install'

    - task: CopyFiles@2
      displayName: 'Stage deploy files'
      inputs:
        SourceFolder: '$(rootFolder)'
        Contents: |
          app/**
          bootstrap/app.php
          bootstrap/providers.php
          config/**
          database/**
          public/**
          resources/views/**
          routes/**
          storage/app/public/**
          artisan
          composer.json
          composer.lock
          vendor/**
        TargetFolder: '$(Build.ArtifactStagingDirectory)/app'
        CleanTargetFolder: true

    - task: ArchiveFiles@2
      displayName: 'Archive files'
      inputs:
        rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/app'
        includeRootFolder: false
        archiveType: zip
        archiveFile: $(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip
        replaceExistingArchive: true

    - upload: $(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip
      displayName: 'Upload package'
      artifact: drop

- stage: Deploy
  displayName: 'Deploy Web App'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: DeploymentJob
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: AzureWebApp@1
      displayName: 'Deploy Azure Web App : app-reg-sys'
      inputs:
        azureSubscription: $(azureSubscription)
        appName: $(webAppName)
        appType: webAppLinux
        package: $(Pipeline.Workspace)/drop/$(Build.BuildId).zip
