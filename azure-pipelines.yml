trigger:
- main

variables:
  azureSubscription: '6fe734cc-3f4f-4a31-80ba-59dab1195e36'
  webAppName: 'app-reg-sys'
  vmImageName: 'ubuntu-latest'
  environmentName: 'app-reg-sys'
  rootFolder: $(System.DefaultWorkingDirectory)

stages:
- stage: Build
  displayName: Build stage
  jobs:
  - job: BuildJob
    pool:
      vmImage: $(vmImageName)

    steps:
    - script: |
        set -e

        echo "Checking available PHP binaries..."
        ls -l /usr/bin/php* || true

        if [ -x /usr/bin/php8.4 ]; then
          sudo update-alternatives --set php /usr/bin/php8.4
          sudo update-alternatives --set phar /usr/bin/phar8.4 || true
          sudo update-alternatives --set phpdbg /usr/bin/phpdbg8.4 || true
          sudo update-alternatives --set php-cgi /usr/bin/php-cgi8.4 || true
          sudo update-alternatives --set phar.phar /usr/bin/phar.phar8.4 || true
        else
          echo "PHP 8.4 is not available on this agent."
          echo "composer.lock requires PHP 8.4 because Symfony 8 packages are locked."
          exit 1
        fi

        php -v
        composer --version
      workingDirectory: $(rootFolder)
      displayName: 'Use PHP 8.4'

    - script: |
        set -e
        composer validate --no-check-publish
        composer install --no-interaction --prefer-dist --optimize-autoloader
      workingDirectory: $(rootFolder)
      displayName: 'Composer install'

    - task: ArchiveFiles@2
      displayName: 'Archive files'
      inputs:
        rootFolderOrFile: '$(rootFolder)'
        includeRootFolder: false
        archiveType: zip
        archiveFile: $(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip
        replaceExistingArchive: true

    - upload: $(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip
      displayName: 'Upload package'
      artifact: drop

- stage: Deploy
  displayName: 'Deploy Web App'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeploymentJob
    pool:
      vmImage: $(vmImageName)
    environment: $(environmentName)
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            displayName: 'Deploy Azure Web App : app-reg-sys'
            inputs:
              azureSubscription: $(azureSubscription)
              appName: $(webAppName)
              appType: webAppLinux
              package: $(Pipeline.Workspace)/drop/$(Build.BuildId).zip