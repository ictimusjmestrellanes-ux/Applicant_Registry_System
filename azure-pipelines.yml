trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  phpVersion: '8.3'

steps:

- script: |
    sudo add-apt-repository ppa:ondrej/php -y
    sudo apt-get update
    sudo apt-get install php8.3 php8.3-cli php8.3-mbstring php8.3-xml php8.3-bcmath php8.3-curl php8.3-zip php8.3-pgsql php8.3-intl unzip -y
    php -v
  displayName: 'Install PHP 8.3'

- script: |
    composer install --no-dev --prefer-dist --optimize-autoloader --no-scripts
  displayName: 'Install Composer Dependencies'

- script: |
    cp .env.example .env

- task: ArchiveFiles@2
  inputs:
    rootFolderOrFile: '$(System.DefaultWorkingDirectory)'
    includeRootFolder: false
    archiveType: zip
    archiveFile: '$(Build.ArtifactStagingDirectory)/ventrack.zip'
    replaceExistingArchive: true

- task: AzureWebApp@1
  inputs:
    azureSubscription: 'VENTRACK-AZURE-CONNECTION'
    appName: 'ventrack'
    package: '$(Build.ArtifactStagingDirectory)/ventrack.zip'


